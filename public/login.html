<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar | System CSM</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/auth.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="panel auth-brand">
      <p class="eyebrow">Leitura de extrato</p>
      <div class="brand-title">
        <img src="/images.png" alt="Paróquia de São Tiago Menor">
        <h1>System CSM</h1>
      </div>
      <p class="subtitle">Acesse seus extratos e acompanhe débitos, créditos e saldos em um ambiente seguro.</p>
    </section>

    <section class="panel auth-card">
      <div>
        <p class="eyebrow">Acesso</p>
        <h2>Entrar no sistema</h2>
        <p class="auth-description">Informe os dados da sua conta.</p>
      </div>

      <form class="auth-form" data-auth-form="login" autocomplete="off">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" autocomplete="off" placeholder="seu@email.com" value="" required>

        <label for="password">Senha</label>
        <input id="password" name="password" type="password" autocomplete="new-password" placeholder="Digite sua senha" value="" required>

        <p class="auth-message" role="alert" aria-live="polite"></p>
        <button type="submit">Entrar</button>
      </form>

      <p class="auth-switch">Ainda não possui conta? <a href="/cadastro">Criar cadastro</a></p>
    </section>
  </main>
  <script src="/auth.js"></script>
</body>
</html>
